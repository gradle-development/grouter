packages:
  - .

allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true
  unrs-resolver: true
  workerd: true

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
  - next
  - '@next/*'
  - dompurify

onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - sharp
  - unrs-resolver
  - workerd

pnpm:
  requiredScripts:
    - build

trustPolicy: no-downgrade

trustPolicyExclude:
  - react-redux
  - reselect
  - semver
  - eslint-import-resolver-typescript
  - nanoid
